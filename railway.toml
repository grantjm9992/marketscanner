# Railway deployment config.
#
# Set the following service variables in the Railway UI (most live under
# Variables on the bot service; DATABASE_URL is auto-injected when you
# attach a Postgres plugin via the "Add reference" UI):
#
#   MODE=paper                                # or live, once you've watched paper for days
#   DATABASE_KIND=postgres
#   DATABASE_URL=${{ Postgres.DATABASE_URL }} # auto-populated reference
#   DATABASE_SSL=true
#   POLYMARKET_CLOB_HOST=https://clob.polymarket.com
#   POLYMARKET_WS_HOST=wss://ws-subscriptions-clob.polymarket.com/ws/market
#   RISK_MAX_POSITION_USD=100
#   RISK_MAX_TOTAL_DEPLOYED_USD=500
#   RISK_MAX_DAILY_LOSS_USD=50
#   STRATEGY_NAME=wide-spread-market-maker
#   STRATEGY_MARKETS=          # leave empty if using discovery
#   MARKET_DISCOVERY_ENABLED=true
#   MARKET_DISCOVERY_MIN_VOLUME_USD=5000
#   MARKET_DISCOVERY_MIN_SPREAD=0.01
#   MARKET_DISCOVERY_MAX_SPREAD=0.10
#   MARKET_DISCOVERY_LIMIT=5
#   LOG_LEVEL=info
#
# For live mode also set POLYMARKET_PRIVATE_KEY.

[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && pnpm build"

[deploy]
startCommand = "pnpm start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# This bot has no HTTP endpoint — it's a long-running worker process.
# Health checks are intentionally omitted; Railway will restart it if
# the process exits.
